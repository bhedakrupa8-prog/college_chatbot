<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login · College Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A2238; --indigo:#2D3A8C; --indigo-2:#3B4BB8;
    --saffron:#FF7A3D; --saffron-press:#E85F22;
    --paper:#FFFFFF; --muted:#6B7280; --line:#E6E8F0;
    --error:#C7392F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh; display:grid; place-items:center; padding:20px;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 15% -10%, #3B4BB8 0%, transparent 60%),
      radial-gradient(700px 500px at 110% 120%, #FF7A3D33 0%, transparent 55%),
      #161A2E;
  }
  .card{
    width:100%; max-width:400px; background:var(--paper);
    border-radius:20px; padding:38px 32px;
    box-shadow:0 30px 80px rgba(10,12,30,.45);
  }
  .brand{display:flex; align-items:center; gap:11px; margin-bottom:26px}
  .mark{
    width:42px; height:42px; border-radius:12px; flex:none;
    background:linear-gradient(135deg,var(--indigo),var(--indigo-2));
    display:grid; place-items:center; color:#fff;
    font-family:'Poppins'; font-weight:700; font-size:20px;
    box-shadow:inset 0 0 0 2px #ffffff22;
  }
  .brand h1{font-family:'Poppins'; font-size:17px; font-weight:600; line-height:1.15}
  .brand span{font-size:12px; color:var(--muted)}
  h2{font-family:'Poppins'; font-size:21px; font-weight:600; margin-bottom:4px}
  .sub{color:var(--muted); font-size:13.5px; margin-bottom:22px}
  label{display:block; font-size:12.5px; font-weight:500; margin:0 0 6px 2px; color:#3a4256}
  .field{margin-bottom:16px}
  input{
    width:100%; padding:13px 14px; font-size:15px; font-family:inherit;
    border:1.5px solid var(--line); border-radius:11px; background:#FBFBFD;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{
    outline:none; border-color:var(--saffron);
    box-shadow:0 0 0 3px #FF7A3D2e; background:#fff;
  }
  button{
    width:100%; margin-top:6px; padding:13px; font-size:15px; font-weight:600;
    font-family:'Poppins'; color:#fff; border:none; border-radius:11px; cursor:pointer;
    background:linear-gradient(180deg,var(--saffron),var(--saffron-press));
    box-shadow:0 8px 20px #FF7A3D40; transition:transform .06s, box-shadow .15s;
  }
  button:hover{box-shadow:0 10px 26px #FF7A3D55}
  button:active{transform:translateY(1px)}
  .err{
    background:#FDECEA; color:var(--error); font-size:13px; font-weight:500;
    padding:10px 12px; border-radius:10px; margin-bottom:16px;
    border:1px solid #F5C6C0;
  }
  .hint{margin-top:18px; text-align:center; font-size:12px; color:var(--muted)}
  .hint code{background:#F1F2F7; padding:1px 6px; border-radius:5px; font-size:11.5px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark">C</div>
      <div>
        <h1>College Assistant</h1>
        <span>Student Portal</span>
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="sub">Log in to chat with your assistant about fees, results, exams and more.</p>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form method="POST" action="/">
      <div class="field">
        <label for="student_id">Student ID</label>
        <input id="student_id" name="student_id" placeholder="e.g. MBA007"
               autocomplete="username" autocapitalize="characters" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="••••" autocomplete="current-password" required>
      </div>
      <button type="submit">Sign in</button>
    </form>
<p class="hint">Demo login: <code>MBA007</code> / <code>1234</code></p>
    <p class="hint" style="margin-top:10px">
     <a href="/admin/login" style="color:var(--indigo-2); font-weight:500; text-decoration:none;">
  Admin login →
</a>
    </p>
  </div>
</body>
</html>
    <p class="hint">Demo login: <code>MBA007</code> / <code>1234</code></p>
  </div>
</body>
</html>
