<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · College</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1A2238;--indigo:#2D3A8C;--indigo-2:#3B4BB8;--saffron:#FF7A3D;--muted:#6B7280;--line:#E6E8F0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(800px 480px at 80% -10%,#3B4BB8 0,transparent 60%),#171B33}
  .card{width:100%;max-width:380px;background:#fff;border-radius:20px;padding:36px 30px;box-shadow:0 30px 80px rgba(10,12,30,.45)}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:22px}
  .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--indigo),var(--indigo-2));
    display:grid;place-items:center;color:#fff;font-family:'Poppins';font-weight:700;font-size:20px}
  .brand b{font-family:'Poppins';font-size:16px}.brand span{font-size:12px;color:var(--muted);display:block}
  h2{font-family:'Poppins';font-size:20px;margin-bottom:18px}
  label{font-size:12.5px;font-weight:600;color:#3a4256;display:block;margin:0 0 6px 2px}
  .field{margin-bottom:15px}
  input{width:100%;padding:12px 14px;font-size:15px;font-family:inherit;border:1.5px solid var(--line);border-radius:11px;background:#FBFBFD}
  input:focus{outline:none;border-color:var(--saffron);box-shadow:0 0 0 3px #FF7A3D2a;background:#fff}
  button{width:100%;margin-top:6px;padding:13px;font-size:15px;font-weight:600;font-family:'Poppins';color:#fff;
    border:none;border-radius:11px;cursor:pointer;background:linear-gradient(180deg,var(--saffron),#E85F22);box-shadow:0 8px 20px #FF7A3D40}
  .err{background:#FDECEA;color:#C7392F;font-size:13px;font-weight:500;padding:10px 12px;border-radius:10px;margin-bottom:15px;border:1px solid #F5C6C0}
  .hint{margin-top:16px;text-align:center;font-size:12px;color:var(--muted)}
  .hint code{background:#F1F2F7;padding:1px 6px;border-radius:5px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="mark">C</div><div><b>College Admin</b><span>Management Panel</span></div></div>
    <h2>Admin sign in</h2>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST" action="/admin/login">
      <div class="field"><label>Username</label><input name="username" autofocus required></div>
      <div class="field"><label>Password</label><input name="password" type="password" required></div>
      <button type="submit">Sign in</button>
    </form>
    <p class="hint">Demo: <code>admin</code> / <code>admin123</code></p>
  </div>
</body>
</html>
